name: trading_core CI

on:
  push:
    branches: [main]
    paths:
      - "building/trading_core/**"
      - ".github/workflows/trading_core_ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "building/trading_core/**"
      - ".github/workflows/trading_core_ci.yml"

defaults:
  run:
    working-directory: building/trading_core

jobs:
  test:
    name: "Test Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Install trading_core as editable package
        working-directory: .
        run: |
          pip install -e building/trading_core

      - name: Run unit + integration tests with coverage
        run: |
          python -m pytest \
            broker/tests/ \
            backtest/tests/ \
            realtime/tests/ \
            tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: building/trading_core/coverage.xml
